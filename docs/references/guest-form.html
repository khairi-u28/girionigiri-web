<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir PO | Giri-giri Onigiri</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            giriRed: '#A90402',
            giriBlack: '#2b2b2b',
            giriWhite: '#ffffff',
            giriBg: '#f4f4f0',
            giriYellow: '#FFDE59',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Noto Serif JP', 'serif'],
          },
          boxShadow: {
            'brutal-sm': '2px 2px 0px 0px #2b2b2b',
            'brutal': '4px 4px 0px 0px #2b2b2b',
            'brutal-lg': '8px 8px 0px 0px #2b2b2b',
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Serif+JP:wght@700;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      background-color: #f4f4f0;
      color: #2b2b2b;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f4f4f0;
      border-left: 2px solid #2b2b2b;
    }

    ::-webkit-scrollbar-thumb {
      background: #A90402;
      border: 2px solid #2b2b2b;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #2b2b2b;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Custom Radio & Checkbox styling for Neo-Brutalism */
    .brutal-radio:checked+div {
      background-color: #A90402;
      color: white;
      border-color: #2b2b2b;
      box-shadow: 2px 2px 0px 0px #2b2b2b;
    }
  </style>
</head>

<body class="font-sans antialiased selection:bg-giriRed selection:text-giriWhite flex flex-col min-h-screen">

  <!-- Simple Navbar untuk Form Page -->
  <nav class="bg-giriWhite border-b-4 border-giriBlack sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <span class="text-xl font-black tracking-tighter uppercase">← Kembali</span>
      </a>
      <div class="flex items-center gap-2">
        <span class="text-xl font-serif font-black text-giriRed">ギリ</span>
        <span class="text-lg font-black tracking-tighter uppercase hidden sm:inline-block">Giri-Giri</span>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-4xl mx-auto px-4 py-8 md:py-12 w-full">

    <div class="mb-8 border-b-4 border-giriBlack pb-4">
      <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tight">Checkout PO</h1>
      <p class="font-bold text-gray-600 mt-2 tracking-widest text-sm uppercase">Isi data di bawah untuk pengiriman esok
        hari.</p>
    </div>

    <form id="orderForm" class="space-y-12">

      <!-- SECTION 1: PILIHAN MENU -->
      <section class="bg-giriWhite border-4 border-giriBlack shadow-brutal p-6 md:p-8 relative">
        <div
          class="absolute -top-4 -left-4 bg-giriYellow border-2 border-giriBlack px-4 py-1 font-black text-xl shadow-brutal-sm transform -rotate-3">
          1</div>
        <h2 class="text-2xl font-black uppercase mb-6 border-b-2 border-dashed border-gray-300 pb-2">Pilih Menu</h2>

        <div class="space-y-6" id="menu-container">
          <!-- Item 1 -->
          <div
            class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-gray-50 border-2 border-giriBlack p-4">
            <div class="flex-grow">
              <h3 class="font-black text-lg uppercase">Tongkol Cue Mayo</h3>
              <p class="font-bold text-giriRed">Rp5.000</p>

              <!-- Opsi Pedas -->
              <div class="mt-3 flex gap-3">
                <label class="cursor-pointer relative">
                  <input type="radio" name="spicy_tongkol" value="tidak" class="peer sr-only brutal-radio">
                  <div
                    class="border-2 border-giriBlack bg-giriWhite px-3 py-1 text-xs font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal-sm">
                    Tidak Pedas</div>
                </label>
                <label class="cursor-pointer relative">
                  <input type="radio" name="spicy_tongkol" value="pedas" class="peer sr-only brutal-radio" checked>
                  <div
                    class="border-2 border-giriBlack bg-giriWhite px-3 py-1 text-xs font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal-sm">
                    Pedas 🌶️</div>
                </label>
              </div>
            </div>

            <div class="flex items-center border-2 border-giriBlack bg-giriWhite h-10 shadow-brutal-sm">
              <button type="button" onclick="updateQty('tongkol', -1)"
                class="w-10 h-full flex items-center justify-center hover:bg-giriRed hover:text-giriWhite font-black text-xl border-r-2 border-giriBlack transition-colors">-</button>
              <input type="number" id="qty-tongkol" value="0" readonly
                class="w-12 h-full text-center font-bold outline-none bg-transparent">
              <button type="button" onclick="updateQty('tongkol', 1)"
                class="w-10 h-full flex items-center justify-center hover:bg-giriBlack hover:text-giriWhite font-black text-xl border-l-2 border-giriBlack transition-colors">+</button>
            </div>
          </div>

          <!-- Item 2 -->
          <div
            class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-gray-50 border-2 border-giriBlack p-4">
            <div class="flex-grow">
              <h3 class="font-black text-lg uppercase">Tempe Teriyaki</h3>
              <p class="font-bold text-giriRed">Rp5.000</p>
              <!-- Opsi Pedas -->
              <div class="mt-3 flex gap-3">
                <label class="cursor-pointer relative">
                  <input type="radio" name="spicy_tempe" value="tidak" class="peer sr-only brutal-radio" checked>
                  <div
                    class="border-2 border-giriBlack bg-giriWhite px-3 py-1 text-xs font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal-sm">
                    Tidak Pedas</div>
                </label>
                <label class="cursor-pointer relative">
                  <input type="radio" name="spicy_tempe" value="pedas" class="peer sr-only brutal-radio">
                  <div
                    class="border-2 border-giriBlack bg-giriWhite px-3 py-1 text-xs font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal-sm">
                    Pedas 🌶️</div>
                </label>
              </div>
            </div>

            <div class="flex items-center border-2 border-giriBlack bg-giriWhite h-10 shadow-brutal-sm">
              <button type="button" onclick="updateQty('tempe', -1)"
                class="w-10 h-full flex items-center justify-center hover:bg-giriRed hover:text-giriWhite font-black text-xl border-r-2 border-giriBlack transition-colors">-</button>
              <input type="number" id="qty-tempe" value="0" readonly
                class="w-12 h-full text-center font-bold outline-none bg-transparent">
              <button type="button" onclick="updateQty('tempe', 1)"
                class="w-10 h-full flex items-center justify-center hover:bg-giriBlack hover:text-giriWhite font-black text-xl border-l-2 border-giriBlack transition-colors">+</button>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: PENGIRIMAN -->
      <section class="bg-giriWhite border-4 border-giriBlack shadow-brutal p-6 md:p-8 relative">
        <div
          class="absolute -top-4 -left-4 bg-giriYellow border-2 border-giriBlack px-4 py-1 font-black text-xl shadow-brutal-sm transform -rotate-3">
          2</div>
        <h2 class="text-2xl font-black uppercase mb-6 border-b-2 border-dashed border-gray-300 pb-2">Detail Pengiriman
        </h2>

        <div class="space-y-6">
          <!-- Metode Pengiriman -->
          <div>
            <label class="block font-black uppercase text-sm mb-3">Pilih Lokasi Pengiriman <span
                class="text-giriRed">*</span></label>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <label class="cursor-pointer relative">
                <input type="radio" name="delivery_type" value="kantor" class="peer sr-only brutal-radio"
                  onchange="toggleAddressField()" checked>
                <div
                  class="border-2 border-giriBlack bg-gray-50 p-4 font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal text-center flex flex-col items-center gap-2">
                  <span class="text-2xl">🏢</span>
                  <span>Kantor (Khairi)</span>
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input type="radio" name="delivery_type" value="rumah" class="peer sr-only brutal-radio"
                  onchange="toggleAddressField()">
                <div
                  class="border-2 border-giriBlack bg-gray-50 p-4 font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal text-center flex flex-col items-center gap-2">
                  <span class="text-2xl">🏠</span>
                  <span>Alamat Lain (Cipayung)</span>
                </div>
              </label>
            </div>
          </div>

          <!-- Input Detail Alamat / Divisi -->
          <div id="address_container" class="bg-gray-100 p-4 border-l-4 border-giriBlack">
            <label id="address_label" class="block font-bold uppercase text-sm mb-2">Nama & Divisi (Contoh: Khairi - IT)
              <span class="text-giriRed">*</span></label>
            <textarea id="address_input" rows="2"
              class="w-full bg-giriWhite border-2 border-giriBlack p-3 font-medium focus:outline-none focus:shadow-brutal-sm transition-shadow resize-none"
              placeholder="Masukkan detail divisi meja..."></textarea>
          </div>

          <!-- Tanggal Pengiriman -->
          <div>
            <label class="block font-black uppercase text-sm mb-2">Tanggal Pengiriman <span
                class="text-giriRed">*</span></label>
            <input type="date" id="delivery_date"
              class="bg-giriWhite border-2 border-giriBlack p-3 font-bold uppercase focus:outline-none focus:shadow-brutal-sm transition-shadow">
            <p class="text-xs font-bold text-giriRed mt-2 tracking-widest uppercase">* Minimal H+1 dari tanggal order.
            </p>
          </div>
        </div>
      </section>

      <!-- SECTION 3: PEMBAYARAN -->
      <section class="bg-giriWhite border-4 border-giriBlack shadow-brutal p-6 md:p-8 relative">
        <div
          class="absolute -top-4 -left-4 bg-giriYellow border-2 border-giriBlack px-4 py-1 font-black text-xl shadow-brutal-sm transform -rotate-3">
          3</div>
        <h2 class="text-2xl font-black uppercase mb-6 border-b-2 border-dashed border-gray-300 pb-2">Metode Pembayaran
        </h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <label class="cursor-pointer relative">
            <input type="radio" name="payment_method" value="cod" class="peer sr-only brutal-radio" checked>
            <div
              class="border-2 border-giriBlack bg-gray-50 p-4 font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal h-full flex flex-col justify-center">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-2xl">💵</span>
                <span class="text-lg">Bayar Langsung</span>
              </div>
              <p class="text-xs text-gray-600 font-medium normal-case">Bayar ke Khairi / Adik saat makanan diantar.</p>
            </div>
          </label>
          <label class="cursor-pointer relative">
            <input type="radio" name="payment_method" value="qris" class="peer sr-only brutal-radio">
            <div
              class="border-2 border-giriBlack bg-gray-50 p-4 font-bold uppercase transition-all hover:-translate-y-1 hover:shadow-brutal h-full flex flex-col justify-center">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-2xl">📱</span>
                <span class="text-lg">QRIS / Transfer</span>
              </div>
              <p class="text-xs text-gray-600 font-medium normal-case">Lanjut konfirmasi bukti transfer via WhatsApp.
              </p>
            </div>
          </label>
        </div>
      </section>

      <!-- FLOATING TOTAL & SUBMIT -->
      <div class="sticky bottom-4 z-40">
        <div
          class="bg-giriBlack border-4 border-giriRed shadow-brutal-lg p-4 md:p-6 flex flex-col sm:flex-row items-center justify-between gap-4 transform transition-transform hover:-translate-y-1">
          <div class="text-giriWhite text-center sm:text-left">
            <span class="block text-sm font-bold uppercase tracking-widest text-gray-400">Total Tagihan</span>
            <span class="block text-3xl font-black text-giriYellow" id="total-price">Rp0</span>
          </div>
          <button type="button" onclick="submitForm()"
            class="w-full sm:w-auto bg-giriRed text-giriWhite border-4 border-giriWhite px-8 py-4 font-black uppercase text-lg shadow-[4px_4px_0px_0px_#ffffff] hover:bg-white hover:text-giriRed transition-colors">
            Selesaikan PO
          </button>
        </div>
      </div>

    </form>
  </main>

  <script>
    // State Management
    const prices = { tongkol: 5000, tempe: 5000 };
    const state = { tongkol: 0, tempe: 0 };

    // Set Minimum Date to Tomorrow
    const dateInput = document.getElementById('delivery_date');
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const yyyy = tomorrow.getFullYear();
    const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
    const dd = String(tomorrow.getDate()).padStart(2, '0');
    dateInput.min = `${yyyy}-${mm}-${dd}`;
    dateInput.value = `${yyyy}-${mm}-${dd}`; // Auto fill tomorrow

    function updateQty(item, change) {
      let currentVal = state[item];
      let newVal = currentVal + change;
      if (newVal < 0) newVal = 0;

      state[item] = newVal;
      document.getElementById(`qty-${item}`).value = newVal;

      calculateTotal();
    }

    function calculateTotal() {
      let total = 0;
      for (const [item, qty] of Object.entries(state)) {
        total += qty * prices[item];
      }
      document.getElementById('total-price').innerText = `Rp${total.toLocaleString('id-ID')}`;
      return total;
    }

    function toggleAddressField() {
      const deliveryType = document.querySelector('input[name="delivery_type"]:checked').value;
      const label = document.getElementById('address_label');
      const input = document.getElementById('address_input');

      if (deliveryType === 'kantor') {
        label.innerHTML = 'Nama & Divisi (Contoh: Khairi - IT) <span class="text-giriRed">*</span>';
        input.placeholder = "Masukkan detail divisi / meja kantor...";
      } else {
        label.innerHTML = 'Alamat Lengkap (Area Cipayung) <span class="text-giriRed">*</span>';
        input.placeholder = "Masukkan alamat rumah lengkap dengan RT/RW dan patokan...";
      }
      // Add a little highlight animation
      document.getElementById('address_container').classList.add('bg-yellow-100');
      setTimeout(() => {
        document.getElementById('address_container').classList.remove('bg-yellow-100');
      }, 300);
    }

    function submitForm() {
      const total = calculateTotal();
      if (total === 0) {
        alert("Silakan pilih minimal 1 onigiri terlebih dahulu.");
        return;
      }

      const address = document.getElementById('address_input').value;
      if (!address.trim()) {
        alert("Mohon isi detail alamat / divisi pengiriman.");
        return;
      }

      const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

      let message = "Memproses pesanan PO...\n";
      message += "Total: Rp" + total.toLocaleString('id-ID') + "\n";

      if (paymentMethod === 'qris') {
        alert(message + "Anda akan diarahkan ke WhatsApp untuk konfirmasi QRIS.");
        // Logika redirect WA di sini
      } else {
        alert(message + "Pesanan dicatat! Siapkan uang pas saat pesanan diantar ya.");
        // Logika submit form di sini
      }
    }
  </script>
</body>

</html>
